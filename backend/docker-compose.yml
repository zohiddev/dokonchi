services:
  postgres:
    image: postgres:16-alpine
    container_name: dokonchi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dokonchi
      POSTGRES_PASSWORD: dokonchi
      POSTGRES_DB: dokonchi
    ports:
      - "5433:5432"
    volumes:
      - dokonchi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokonchi -d dokonchi"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: dokonchi-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dokonchi_pgdata:
