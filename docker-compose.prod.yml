# Dokonchi — production (bitta serverda hammasi)
# Ishga tushirish:  docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: dokonchi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Bazani tashqariga ochmaymiz — faqat ichki tarmoqda

  backend:
    build:
      context: ./backend
    container_name: dokonchi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SHOP_NAME: ${SHOP_NAME:-Dokonchi}
      PORT: "3000"
      # seed-prod uchun birinchi admin
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_PHONE: ${ADMIN_PHONE:-+998901234567}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: dokonchi-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
