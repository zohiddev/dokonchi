server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — sahifa tezroq yuklanadi
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # API so'rovlari -> backend konteyneriga.
    # Oxiridagi "/" muhim: /api/auth/login -> backendda /auth/login bo'ladi.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Statik fayllar uchun uzoq muddatli cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — har qanday yo'l index.html ga tushadi (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
