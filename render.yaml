services:
  - type: web
    name: dokonchi-api
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/docs
    envVars:
      # Neon connection string — Render dashboard'da qo'lda kiritiladi
      - key: DATABASE_URL
        sync: false
      # Demo uchun barcha origin'ga ruxsat; keyin Vercel URL'iga cheklanadi
      - key: CORS_ORIGIN
        value: "*"
      # JWT maxfiy kalit — Render avtomatik random generatsiya qiladi
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: "22"
